name: Daily Credential Guard Report

on:
  schedule:
    # Runs daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch_metrics.py > /tmp/metrics.json
          echo "=== Metrics JSON ===" >&2
          cat /tmp/metrics.json >&2

      - name: Generate report
        run: |
          python scripts/generate_report.py /tmp/metrics.json daily > /tmp/report.md

      - name: Save report
        run: |
          mkdir -p reports
          cp /tmp/report.md "reports/$(date -u +%Y-%m-%d)-daily.md"

      - name: Post to GitHub Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/report.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            // Check if report for today already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['daily-report'],
              state: 'open',
              per_page: 5,
            });

            const todayIssue = issues.find(issue => issue.title.includes(today));

            if (todayIssue) {
              console.log(`Report for ${today} already exists: ${todayIssue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Daily Report — ${today}`,
                body: report,
                labels: ['daily-report', 'automated'],
              });
              console.log(`Created issue: ${newIssue.number}`);
            }

      - name: Commit reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Credential Guard Tracker"
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: add daily report for $(date -u +%Y-%m-%d)" && git push)
        continue-on-error: true
